<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrasi Kampus</title>

<style>
*{
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body { 
    background: url(img/umrahbg.jpg) no-repeat center center/cover;
    height: 100vh;
    margin: 0;
}

.overlay {
    background: rgba(255, 255, 255, 0.6);
    height: 100%;
    display: flex;
    justify-content: space-between; /* kiri & kanan */
    align-items: center;
    padding: 0 100px;
}

/* LOGO */
.logo img {
    width: 250px; /* atur ukuran logo */
}

/* FORM */
.registrasi {
    width: 350px;
}

.registrasi h3 {
    text-align: center;
    margin-bottom: 5px;
}

.registrasi p {
    text-align: center;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 25px;
    border: 1px solid black;
    background: transparent;
    outline: none;
}

.btn-group {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

button {
    padding: 10px 20px;
    border-radius: 25px;
    border: 1px solid black;
    background: transparent;
    cursor: pointer;
}

button:hover {
    background: black;
    color: white;
}
</style>
</head>

<body>

<div class="overlay">

    
    <div class="logo">
        <img src="img/logoumrah.png" alt="Logo Kampus">
    </div>

    
    <div class="registrasi">

        <h3>Selamat Datang!</h3>
        <p>Sistem Registrasi</p>

        <form>
            <input type="text" placeholder="Nama">
            <input type="text" placeholder="NIM">
            <input type="email" placeholder="Email">

            <select>
                <option>Prodi</option>
                <option>Teknik Informatika</option>
                <option>Sistem Informasi</option>
            </select>

            <input type="password" placeholder="Password">
            <input type="password" placeholder="Konfirmasi Password">

            <div class="btn-group">
                <button type="submit">Registrasi</button>
                <button type="button">Kembali</button>
            </div>
        </form>

    </div>

</div>

</body>
</html>
